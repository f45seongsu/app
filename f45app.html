function weeklyPattern(m,weeks){
 // 최근 weeks주간, 각 주(월~일)별 출석 횟수 배열 (오래된주 → 최근주 순)
 const t=new Date(today+'T00:00:00');
 const dow=(t.getDay()+6)%7; const thisMon=new Date(t); thisMon.setDate(t.getDate()-dow);
 const days=new Set(m._days||[]);
 const arr=[];
 for(let w=weeks-1;w>=0;w--){
  const start=new Date(thisMon); start.setDate(thisMon.getDate()-w*7);
  let cnt=0;
  for(let d=0;d<7;d++){const cur=new Date(start); cur.setDate(start.getDate()+d); if(cur>t)break; if(days.has(fmt(cur)))cnt++;}
  arr.push(cnt);
 }
 return arr;
}

// ===== 리포트 탭 (회원권 데이터 기반 월별 순수 활성 회원수 + AI 코멘트) =====
function monthRangesN(n){
 const t=new Date(today+'T00:00:00');
 const arr=[];
 for(let i=n-1;i>=0;i--){
  const first=new Date(t.getFullYear(),t.getMonth()-i,1);
  const last=new Date(t.getFullYear(),t.getMonth()-i+1,0);
  const end=(last>t)?t:last;
  arr.push({label:(first.getMonth()+1)+'월', start:fmt(first), end:fmt(end)});
 }
 return arr;
}
function activeCountAt(dateStr){
 // 그 시점 기준 "활성 유료 회원" 수 — 트라이얼/횟수권/무료혜택/리드 제외, 회원권 가입일~만료일 기준
 let c=0;
 Object.values(MEMBERS).forEach(m=>{
  if(!m.glofox_user_id) return;
  if(!payMember(m)) return;                          // 횟수권·무료혜택 제외
  if(!['회원','과거회원'].includes(m.stage)) return;   // 트라이얼·리드·기타 제외
  const jd = m.join_date && m.join_date.length>=10 ? m.join_date.slice(0,10) : null;
  if(!jd || jd>dateStr) return;                       // 가입 전이면 제외
  const ed = m.end_date && m.end_date.length>=10 ? m.end_date.slice(0,10) : null;
  if(ed){
   if(ed<dateStr) return;                             // 그 시점에 이미 만료됐으면 제외
  } else {
   if(m.stage!=='회원') return;                       // 만료일 없는 구독형은 현재도 활성일 때만 인정
  }
  c++;
 });
 return c;
}
function currentActiveCount(){
 // 오늘 기준 정확한 활성 유료회원 수 — 정회원(stage='회원') + 유효 횟수권 보유자(stage 라벨과 무관)
 return Object.values(MEMBERS).filter(m=>{
  if(!m.glofox_user_id||!payMember(m))return false;
  if(m.stage==='회원')return true;
  if(m.pass_remaining!=null && (m.pass_total||0)>=10 && m.pass_remaining>0)return true;
  return false;
 }).length;
}
async function renderReport(){
 const box=document.getElementById('view-report');
 const N=4;
 const ranges=monthRangesN(N);
 const nowCount=currentActiveCount();

 // 과거 달은 "스냅샷"이 있으면 그 값을 쓰고, 없으면 정직하게 "데이터없음" 표시
 const{data:snaps}=await sb.from('active_snapshots').select('month,count');
 const snapMap={}; (snaps||[]).forEach(s=>snapMap[s.month]=s.count);
 const thisMonthKey=`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;

 const counts=ranges.map((r,i)=>{
  const key=`${new Date(r.end).getFullYear()}-${String(new Date(r.end).getMonth()+1).padStart(2,'0')}`;
  if(i===N-1) return nowCount;              // 이번 달은 항상 실시간 정확한 값
  return (key in snapMap) ? snapMap[key] : null;  // 스냅샷 없으면 null(데이터없음)
 });

 const newS=ranges.map((r,i)=>{const p=i?ranges[i-1].end:ddaysAgo(120);
  return Object.values(MEMBERS).filter(m=>payMember(m)&&['회원','과거회원'].includes(m.stage)&&m.join_date&&m.join_date.slice(0,10)>p&&m.join_date.slice(0,10)<=r.end).length;});
 const expd=ranges.map((r,i)=>{const p=i?ranges[i-1].end:ddaysAgo(120);
  return Object.values(MEMBERS).filter(m=>payMember(m)&&m.end_date&&m.end_date.slice(0,10)>p&&m.end_date.slice(0,10)<=r.end).length;});

 const validCounts=counts.filter(c=>c!=null);
 const max=Math.max(...validCounts,1);
 const bars=ranges.map((r,i)=>{
  const c=counts[i];
  if(c==null){
   return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
    <div style="font-size:11px;color:var(--dim)">데이터없음</div>
    <div style="width:60%;height:12px;background:var(--line);border-radius:4px 4px 0 0"></div>
    <div style="font-size:11px;color:var(--dim)">${r.label}</div></div>`;
  }
  const h=Math.round(c/max*70)+10;
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1">
   <div style="font-size:12px;color:var(--dim)">${c}</div>
   <div style="width:60%;height:${h}px;background:var(--red);border-radius:4px 4px 0 0"></div>
   <div style="font-size:11px;color:var(--dim)">${r.label}</div></div>`;
 }).join('');

 const firstValid=counts.find(c=>c!=null);
 const diff=(firstValid!=null)?nowCount-firstValid:null;

 box.innerHTML=`<div class="listhead">📊 <b>월별 활성 회원수</b> (트라이얼·횟수권·리드 제외)</div>
  <div style="display:flex;align-items:flex-end;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 10px;margin-bottom:10px">${bars}</div>
  <div class="mini" style="color:var(--dim);margin-bottom:14px">⚠ 과거 스냅샷이 없는 달은 정확한 소급 계산이 불가능해 "데이터없음"으로 표시돼요. 아래 버튼으로 이번 달부터 매달 저장하면 다음 달부터 정확한 추이가 쌓여요.</div>
  <div class="stats" style="margin-bottom:10px">
   <div class="stat"><b>${nowCount}</b><span>현재 활성(정확)</span></div>
   <div class="stat"><b style="color:${diff==null?'var(--dim)':(diff>=0?'var(--grn)':'#e0563a')}">${diff==null?'-':(diff>=0?'+':'')+diff}</b><span>${N}개월 순증감</span></div>
   <div class="stat"><b>${newS.reduce((a,b)=>a+b,0)}</b><span>${N}개월 신규가입</span></div>
  </div>
  <button class="mini" onclick="saveSnapshot()">📌 이번 달 스냅샷 저장 (${thisMonthKey})</button>
  <div id="aiReportBox" style="margin-top:10px"><button class="mini" onclick="genAiReport()">🤖 AI 코멘트 생성</button></div>`;
 window._reportStats={weeks:ranges.map(r=>r.label),counts:counts.map(c=>c??0),newS,expd};
}
async function saveSnapshot(){
 const key=`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
 const c=currentActiveCount();
 try{

 }catch(e){box.innerHTML='<div class="center">오류: '+esc(e.message)+'</div>';}

async function ensureMileData(){
 if(MILEDATA)return;
 const cnt={};let frm=0;
 while(true){
  const{data,error}=await sb.from('attendance').select('glofox_user_id,class_time').eq('attended',true).range(frm,frm+999);
  if(error)throw new Error(error.message);
  (data||[]).forEach(a=>{const u=a.glofox_user_id;if(!u)return;(cnt[u]=cnt[u]||[]).push((a.class_time||'').slice(0,10));});
  if(!data||data.length<1000)break; frm+=1000;
 }
 MILEDATA=cnt;
}
window._tshirtOpen=true;
function toggleTshirtSection(){window._tshirtOpen=!window._tshirtOpen;renderTshirt();}
async function renderTshirt(){
 const box=document.getElementById('view-tshirt');
 box.innerHTML='<div class="center">불러오는 중…</div>';
 try{
 await ensureMileData();

 function isMileValue(n){return n===45 || (n>=100 && n%100===0);}
 function totalVisits(m){
  const dates=MILEDATA[m.glofox_user_id]||[];
  if(m.visit_base!=null){const bd=m.visit_base_date||'2000-01-01';const after=dates.filter(d=>d>bd).length;return (m.visit_base||0)+after;}
  return dates.length;
 }
 function achievedMilestoneOf(t){
  if(t<45)return null;
  let v=45; while(true){const nxt=(v===45?100:v+100); if(nxt>t)break; v=nxt;}
  return v;
 }
 const d14=ddaysAgo(14);

 // ── 이미 지급한 기록 ──
 const{data:givenRows}=await sb.from('tshirt_given').select('glofox_user_id,milestone,size');
 const givenMap={}; (givenRows||[]).forEach(g=>givenMap[g.glofox_user_id+'_'+g.milestone]=g.size);

 // ── 1) 최근 14일 이내 마일스톤 달성 (우선순위 높음) ──
 let achieved=[];
 Object.values(MEMBERS).forEach(m=>{
  if(!m.glofox_user_id||m.stage!=='회원'||!payMember(m))return;
  const dates=(MILEDATA[m.glofox_user_id]||[]).slice().sort();
  if(!dates.length)return;
  const t=totalVisits(m);
  const past14=dates.filter(d=>d>d14);
  if(!past14.length)return;
  const t14=t-past14.length;
  for(let v=45;v<=t;v=(v===45?100:v+100)){
   if(v>t14 && v<=t && isMileValue(v)){ achieved.push({uid:m.glofox_user_id,t,mile:v}); break; }
  }
 });
 achieved.sort((a,b)=>b.mile-a.mile);
 const achievedKeys=new Set(achieved.map(a=>a.uid+'_'+a.mile));

 // ── 2) 전체 미지급 백로그 (14일 이전에 달성했지만 아직 티셔츠 안 준 사람 전체) ──
 let backlog=[];
 Object.values(MEMBERS).forEach(m=>{
  if(!m.glofox_user_id||m.stage!=='회원'||!payMember(m))return;
  const t=totalVisits(m);
  const ms=achievedMilestoneOf(t);
  if(!ms)return;
  const key=m.glofox_user_id+'_'+ms;
  if(achievedKeys.has(key))return;       // 이미 최근달성 목록에 있음
  if(givenMap[key])return;               // 이미 지급함
  backlog.push({uid:m.glofox_user_id,t,mile:ms});
 });
 backlog.sort((a,b)=>b.t-a.t);

 // ── 3) 다가오는(20회 이내) — 출석 속도 기반 예상일 포함 ──
 function weeklyPace(m){
  const dates=MILEDATA[m.glofox_user_id]||[];
  const d28=ddaysAgo(28);
  const recent=dates.filter(d=>d>d28).length;
  return recent/4; // 최근 4주 평균 주당 출석
 }
 function predictDays(rem,pace){
  if(pace<=0)return null;
  return Math.round(rem/(pace/7));
 }
 let upcoming=[];
 Object.values(MEMBERS).forEach(m=>{
  if(!m.glofox_user_id||m.stage!=='회원'||!payMember(m))return;
  const dates=MILEDATA[m.glofox_user_id]||[];
  const recent=dates.filter(d=>d>d14).length; if(recent<1)return;
  const t=totalVisits(m); if(t<40)return;
  const nm=nextMile(t); const rem=nm-t; if(rem>20)return;
  if(achievedKeys.has(m.glofox_user_id+'_'+nm))return;
  const pace=weeklyPace(m); const days=predictDays(rem,pace);
  upcoming.push({uid:m.glofox_user_id,t,nm,rem,days});
 });
 upcoming.sort((a,b)=>a.rem-b.rem);

 // ── 3-2) 예상 캘린더용 넓은 후보군 (21~100회 남은 사람까지, 최근 활동 있는 사람만) ──
 let forecast=[];
 Object.values(MEMBERS).forEach(m=>{
  if(!m.glofox_user_id||m.stage!=='회원'||!payMember(m))return;
  const dates=MILEDATA[m.glofox_user_id]||[];
  const recent=dates.filter(d=>d>d14).length; if(recent<1)return;
  const t=totalVisits(m); if(t<40)return;
  const nm=nextMile(t); const rem=nm-t;
  if(rem<=20)return; // 임박자 목록과 중복 방지 (이미 위에 있음)
  const pace=weeklyPace(m); const days=predictDays(rem,pace);
  if(days==null||days>90)return; // 예측 불가하거나 너무 먼 미래는 제외
  forecast.push({uid:m.glofox_user_id,t,nm,rem,days});
 });
 // 주간 버킷으로 묶기 (이번주/1주후/2주후.../8주 이후)
 const weekBuckets={};
 forecast.forEach(x=>{
  const wk=Math.min(Math.floor(x.days/7),8);
  (weekBuckets[wk]=weekBuckets[wk]||[]).push(x);
 });

 // ── 4) 재고 & 입고예정 ──
 const{data:inv}=await sb.from('tshirt_inventory').select('milestone,size,qty').order('milestone');
 const invMap={}; (inv||[]).forEach(r=>{invMap[r.milestone+'_'+r.size]=r.qty;});
 const{data:incoming}=await sb.from('tshirt_incoming').select('id,milestone,size,qty,expected_date').eq('arrived',false).order('expected_date');
 const SIZES=['S','M','L','XL','2XL'];
 const incAgg={}; (incoming||[]).forEach(o=>{const k=o.milestone+'_'+o.size; incAgg[k]=(incAgg[k]||0)+o.qty;});
 const milestones=[...new Set([...(inv||[]).map(r=>r.milestone), ...achieved.map(a=>a.mile), ...backlog.map(b=>b.mile), ...upcoming.map(u=>u.nm), ...(incoming||[]).map(o=>o.milestone)])].sort((a,b)=>a-b);

 const achOpen=window._tshirtOpen;
 const bkOpen=window._tshirtBacklogOpen!==false;

 function personRow(x,badgeTxt,mode){

 function grid2(items){ return `<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">${items.join('')}</div>`; }

 const achievedHTML = !achieved.length ? '' :

function buildSessions(rows){
 const ev={};
 rows.forEach(r=>{
  const ct=String(r.class_time||''); const ds=ct.slice(0,10); const tm=ct.slice(11,16);
  if(!r.event_id||ds.length<10)return;
  const e=ev[r.event_id]||(ev[r.event_id]={date:ds,time:tm,name:r.class_name||'수업',att:{}});
  const prev=e.att[r.glofox_user_id]||{};
  e.att[r.glofox_user_id]={attended:(r.attended||prev.attended||false),status:r.status||prev.status||''};
  if(r.attended){const m=MEMBERS[r.glofox_user_id];if(m){(m._days=m._days||[]);if(!m._days.includes(ds))m._days.push(ds);(m._att=m._att||[]);m._att.push(ds+' '+tm);}}
 });
 const bySlot={};
 Object.values(ev).forEach(e=>{const cnt=Object.keys(e.att).length;const key=e.date+'|'+e.time+'|'+e.name;if(!bySlot[key]||cnt>bySlot[key]._cnt){e._cnt=cnt;bySlot[key]=e;}});
 SESSIONS={};
 Object.values(bySlot).forEach(e=>{(SESSIONS[e.date]=SESSIONS[e.date]||[]).push({time:e.time,name:e.name,att:Object.entries(e.att).map(([uid,a])=>({uid,attended:a.attended,status:a.status}))})});
 Object.keys(SESSIONS).forEach(d=>SESSIONS[d].sort((a,b)=>a.time<b.time?-1:1));
 DATES=Object.keys(SESSIONS).sort();
 sel=DATES.includes(today)?today:DATES[DATES.length-1];
}

function smsOpen(){const ph=pickedMembers().map(m=>(m.phone||'').replace(/[^0-9]/g,'')).filter(x=>x);
 if(!ph.length){alert('선택된 회원 중 번호가 없어요.');return;}location.href='sms:'+ph.join(',');}
function fmt(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function timeColor(h){
 if(h>=6&&h<12){const t=(h-6)/6;return `hsl(353,75%,${38+t*22}%)`;}
 if(h>=12&&h<15){const t=(h-12)/3;return `hsl(45,85%,${44+t*16}%)`;}
 const t=Math.min(Math.max((h-15)/9,0),1);return `hsl(210,70%,${40+t*24}%)`;}
function weekGrid(dayHour){const set=dayHour||{};const t=new Date(today+'T00:00:00');let cnt=0;
 const dow=(t.getDay()+6)%7;const mon=new Date(t);mon.setDate(t.getDate()-dow);let cells='';
 for(let w=3;w>=0;w--)for(let d=0;d<6;d++){const cur=new Date(mon);cur.setDate(mon.getDate()-w*7+d);
  const ds=fmt(cur);const has=set[ds]!=null;const fut=cur>t;if(has)cnt++;
  const style=has?`style="background:${timeColor(set[ds])}"`:'';
  cells+=`<div class="${has?'on':''} ${fut?'fut':''}" ${style}></div>`;}
 return {html:cells,cnt};}
function copyTxt(t,msg){navigator.clipboard.writeText(t);alert(msg+'\n'+t)}
function bigPhoto(url){if(!url)return;document.getElementById('lightbox').innerHTML=`<img src="${url}">`;document.getElementById('lightbox').style.display='flex'}

function ageInfo(b){if(!b||b.length<10)return null;const by=+b.slice(0,4),bm=+b.slice(5,7),bd=+b.slice(8,10);const n=new Date();let man=n.getFullYear()-by;if(n.getMonth()+1<bm||(n.getMonth()+1===bm&&n.getDate()<bd))man--;const kor=n.getFullYear()-by+1;return{man,kor,disp:`${b} · 만 ${man}세 (한국 ${kor}세)`};}
function recent4wCount(m){
 const d28=ddaysAgo(28);
 return (m._days||[]).filter(d=>d>d28).length;
}
function freqColor4w(n){
 if(n==null||n===0)return 'var(--dim)';
 if(n<=7)return '#5ac0e0';
 if(n<=11)return '#5ec770';
 if(n<=15)return '#e0563a';
 return '#b070e0';
}
function visitTotal(m){const days=(m._days||[]);if(m.visit_base==null){return days.length||null;}const vbd=m.visit_base_date||'2000-01-01';const after=days.filter(d=>d>vbd).length;return (m.visit_base||0)+after;}
function isBdayToday(m){if(!m.birth||m.birth.length<10)return false;const n=new Date();return (+m.birth.slice(5,7))===n.getMonth()+1&&(+m.birth.slice(8,10))===n.getDate();}
function daysToBday(m){if(!m.birth||m.birth.length<10)return 999;const n=new Date();const b=new Date(n.getFullYear(),+m.birth.slice(5,7)-1,+m.birth.slice(8,10));const t=new Date(n.getFullYear(),n.getMonth(),n.getDate());let d=Math.round((b-t)/86400000);if(d<0)d+=365;return d;}
function msgBday(uid){const m=MEMBERS[uid]||{};const nm=m.name||'회원';const k=ageInfo(m.birth);return `${nm}님, 생일 진심으로 축하드려요! 🎉 F45 성수에서 올 한 해도 건강하고 활기차게 보내세요 💪 생일 기념 방문하시면 작은 선물 준비해뒀어요 😊`;}
function smsBday(uid){const m=MEMBERS[uid]||{};const ph=(m.phone||'').replace(/[^0-9]/g,'');if(!ph){alert('번호가 없어요.');return;}location.href='sms:'+ph+'&body='+encodeURIComponent(msgBday(uid));}
function copyBday(uid){navigator.clipboard.writeText(msgBday(uid));alert('생일 문구 복사됨');}
async function upDetailPhoto(uid,file){await upPhotoApp(uid,file);open_(uid);}
async function delDetailPhoto(uid){if(!confirm('이 회원의 등록 사진을 삭제할까요?'))return;
 try{const{error}=await sb.from('people').update({photo_url:null}).eq('glofox_user_id',uid);
  if(error){alert('삭제 실패: '+error.message);return;}
  if(MEMBERS[uid])MEMBERS[uid].photo_url=null; open_(uid);
 }catch(e){alert('오류: '+e.message);}}
async function hideTrial(uid){
 if(!confirm('이 회원을 트라이얼 현황에서 더 이상 안 보이게 할까요?\n(등록 완료했거나 더 이상 관리 안 해도 되는 경우에 사용하세요)'))return;
 try{
  const{error}=await sb.from('people').update({trial_hidden:true}).eq('glofox_user_id',uid);
  if(error){alert('처리 실패: '+error.message);return;}
  if(MEMBERS[uid])MEMBERS[uid].trial_hidden=true;
  renderTrial();
 }catch(e){alert('오류: '+e.message);}
}
async function editName(uid){
 const m=MEMBERS[uid]||{};
 const nv=prompt('이름을 수정하세요',m.name||'');
 if(nv==null)return; const name=nv.trim(); if(!name)return;
 try{const{error}=await sb.from('people').update({name_override:name}).eq('glofox_user_id',uid);
  if(error){alert('저장 실패: '+error.message);return;}
  if(MEMBERS[uid]){MEMBERS[uid].name_override=name;MEMBERS[uid].name=name;} open_(uid);
 }catch(e){alert('오류: '+e.message);}
}
function isRomanName(s){s=(s||'').trim();return !!s && /^[A-Za-z .'-]+$/.test(s);}
async function aiNameSuggest(uid,btn){
 const m=MEMBERS[uid]||{};
 const orig=btn.textContent; btn.textContent='추정 중…'; btn.style.pointerEvents='none';
 try{
  const {data,error}=await sb.functions.invoke('glofox-ai',{body:{type:'name',name:m.name||m.glofox_name||''}});
  if(error||!data?.text){alert('추천 실패: '+(error?.message||'응답을 받지 못했어요'));btn.textContent=orig;btn.style.pointerEvents='';return;}
  const suggested=data.text.trim();
  if(confirm(`"${suggested}"(으)로 바꿀까요?`)){
   const {error:e2}=await sb.from('people').update({name_override:suggested}).eq('glofox_user_id',uid);
   if(e2){alert('저장 실패: '+e2.message);btn.textContent=orig;btn.style.pointerEvents='';return;}
   if(MEMBERS[uid]){MEMBERS[uid].name_override=suggested;MEMBERS[uid].name=suggested;}
   open_(uid);
  }else{btn.textContent=orig;btn.style.pointerEvents='';}
 }catch(e){alert('오류: '+e.message);btn.textContent=orig;btn.style.pointerEvents='';}
}
async function open_(uid){
 const m=MEMBERS[uid]||{name:'(미등록)'};
 if(COACH_TOKEN&&COACH){sb.from('coach_activity').insert({token:COACH_TOKEN,coach_name:COACH,event_type:'view_member',meta:m.name||uid}).then(()=>{},()=>{});}
 const {data:att}=await sb.from('attendance').select('class_time,attended,class_name').eq('glofox_user_id',uid).eq('attended',true).order('class_time',{ascending:false});
 const {data:mlog}=await sb.from('memo_log').select('id,coach_name,content,created_at').eq('glofox_user_id',uid).order('created_at',{ascending:false});
 const dayHour={};
 (att||[]).forEach(a=>{const ct=String(a.class_time);const ds=ct.slice(0,10);const hh=parseInt(ct.slice(11,13));if(!isNaN(hh)){if(dayHour[ds]==null||hh<dayHour[ds])dayHour[ds]=hh;}});
 const total=(att||[]).length; const w=weekGrid(dayHour); const bd=badgeOf(m);
 let fullVisits=total;
 if(m.visit_base!=null){const vbd=m.visit_base_date||'2000-01-01';const after=(att||[]).filter(a=>(a.class_time||'').slice(0,10)>vbd).length;fullVisits=(m.visit_base||0)+after;}
 const ph=(m.phone||'').replace(/[^0-9]/g,''); const ig=(m.instagram||'').replace('@','');
 const passHTML = m.pass_remaining!=null ? `<div class="pass">횟수권 · 잔여 <b>${m.pass_remaining}회</b> / 총 ${m.pass_total||'-'}회<br><span style="color:var(--dim);font-size:12px">만료 ${esc(m.pass_expiry)||'-'}</span></div>`:'';
 const nameSuggestBtn = isRomanName(m.name) ? ` <span class="mini" style="cursor:pointer;font-weight:400" onclick="aiNameSuggest('${uid}',this)">🤖 AI 이름추천</span>` : '';
 document.getElementById('sheet').innerHTML=`<span class="close" onclick="close_()">×</span>
 <div class="mhead"><span onclick="bigPhoto('${esc(photoOf(m))}')">${avatar(m,'bk')}</span><div><h2 style="font-size:19px">${esc(m.name)} ${bd?`<span class="badge b-${bd}">${bd}</span>`:''} <span class="mini" style="cursor:pointer;font-weight:400" onclick="editName('${uid}')">✏️ 이름수정</span>${nameSuggestBtn}</h2></div></div>
 <div class="mrow"><span class="mk">연락처</span><span>${esc(m.phone)||'-'}</span>${ph?`<span class="acts"><a class="mini" href="tel:${ph}">통화</a><a class="mini" href="sms:${ph}">문자</a><span class="mini" onclick="copyTxt('${esc(m.phone)}','번호 복사됨 · 카톡에 붙여넣기')">카톡</span></span>`:''}</div>
 <div class="mrow"><span class="mk">인스타</span><span>${ig?'@'+esc(ig):'-'}</span>${ig?`<span class="acts"><span class="mini" onclick="copyTxt('@${esc(ig)}','태그 복사됨')">태그</span></span>`:''}</div>
 <div class="mrow"><span class="mk">멤버십</span>${esc(m.membership)||'-'}</div>
 <div class="mrow"><span class="mk">가입일</span>${esc(m.join_date)||'-'}</div>
 <div class="mrow"><span class="mk">만료일</span>${esc(m.end_date)||'-'}</div>
 <div class="mrow"><span class="mk">생년월일</span>${m.birth?esc((ageInfo(m.birth)||{}).disp||m.birth):'-'}${isBdayToday(m)?' 🎂 <b style="color:var(--red)">오늘 생일!</b>':''}</div>
 ${passHTML}
 <label class="photobtn" for="d_photo" ondragover="dOverA(event)" ondragleave="dLeaveA(event)" ondrop="dropA(event,'${uid}')">📷 사진 추가 / 변경 (탭 또는 드래그)</label>
 <input type="file" id="d_photo" accept="image/*" style="display:none" onchange="upDetailPhoto('${uid}',this.files[0])">
 ${m.photo_url?`<div style="text-align:center;margin-top:6px"><span class="mini" style="color:#e0563a;cursor:pointer" onclick="delDetailPhoto('${uid}')">🗑 등록 사진 삭제</span></div>`:''}
 <div class="stats"><div class="stat"><b>${fullVisits}</b><span>총 방문</span></div><div class="stat"><b>${w.cnt}</b><span>최근 4주</span></div></div>
 <div class="wklab">최근 4주 출석 (월~토) · 색상=주 출석 시간대</div><div class="sqwrap"><div class="sqhead"><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div><div class="sq">${w.html}</div></div>
 <div style="display:flex;gap:12px;margin-top:6px;font-size:11px"><span style="color:#e06a6a">■ 오전</span><span style="color:#e0c94f">■ 점심</span><span style="color:#5aa0e0">■ 오후/저녁</span></div>
 <div class="wklab" style="margin-top:14px">부상/주의</div><textarea id="f_injury">${esc(m.injury_note)}</textarea>
 <div class="wklab" style="margin-top:8px">메모</div><textarea id="f_memo">${esc(m.memo)}</textarea>
 ${channelRow('f_memo')}
 <div class="wklab" style="margin-top:14px">코치 코멘트 ${(COACH||ACTIVE_STAFF)?`· <span style="color:var(--dim);font-weight:400">${esc(COACH||ACTIVE_STAFF)}(으)로 남겨요</span>`:'<span style="color:#e0954f;font-weight:400"> · 작성자 미선택 (상단 🙋 버튼)</span>'}</div>
 <div id="memoLogList">${(mlog||[]).map(x=>{const d=new Date(x.created_at);const ds=`${String(d.getFullYear()).slice(2)}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;return `<div class="memoLogItem"><b>${ds}</b> <span style="color:#5aa0e0">${esc(x.coach_name||'?')}</span> · ${esc(x.content)}</div>`;}).join('')||'<div class="mini" style="color:var(--dim)">아직 코멘트가 없어요.</div>'}</div>
 <div style="display:flex;gap:6px;margin-top:6px"><input id="f_newcomment" class="memoin" style="margin-top:0" placeholder="코멘트 입력 (예: 통화함·재등록 예정)" onkeydown="if(event.key==='Enter')addComment('${uid}')"><button class="mini" style="white-space:nowrap" onclick="addComment('${uid}')">추가</button></div>
 ${channelRow('f_newcomment')}
 <button class="mini" style="margin-top:6px" onclick="addHandoffForMember('${uid}')">🔔 인수인계로 등록</button>
 <div class="wklab" style="margin-top:8px">인스타 ID</div><input id="f_insta" value="${esc(m.instagram)}">
 <button class="save" onclick="save('${uid}')">저장</button>
 <div class="hint">저장하면 모든 코치에게 공유돼요.</div>`;
 document.getElementById('modal').style.display='flex'; if(!window._sheetOpen){history.pushState({sheet:1},'');window._sheetOpen=true;};
}
async function addComment(uid){
 const el=document.getElementById('f_newcomment'); const val=(el.value||'').trim();
 if(!val)return;
 const effectiveName = COACH || ACTIVE_STAFF || '';
 if(!effectiveName){ if(!confirm('작성자가 선택 안 됐어요. 상단 🙋 버튼으로 먼저 선택하는 걸 추천해요.\n그래도 "미지정"으로 남길까요?'))return; }
 try{
  const {error}=await sb.from('memo_log').insert({glofox_user_id:uid,coach_name:effectiveName||'미지정',content:val});
  if(error){alert('저장 실패: '+error.message);return;}
  el.value=''; open_(uid);
 }catch(e){alert('오류: '+e.message);}
}
async function save(uid){
 const patch={injury_note:document.getElementById('f_injury').value,memo:document.getElementById('f_memo').value,instagram:document.getElementById('f_insta').value};
 const {error}=await sb.from('people').update(patch).eq('glofox_user_id',uid);
 if(error){alert('저장 실패: '+(error.message||''));return;}
 Object.assign(MEMBERS[uid],patch); close_(); renderDay();
}
function close_(fromPop){
 const md=document.getElementById('modal');
 if(md.style.display==='none')return;
 md.style.display='none';
 if(!fromPop && window._sheetOpen){history.back();}
 window._sheetOpen=false;
}
window.addEventListener('popstate',function(){
 const md=document.getElementById('modal');
 if(md && md.style.display!=='none'){ window._sheetOpen=false; close_(true); }
});
function tag(d,i){const ids=SESSIONS[d][i].att.map(a=>(MEMBERS[a.uid]||{}).instagram).filter(x=>x).map(x=>'@'+x.replace('@',''));
 if(!ids.length){alert('등록된 인스타 ID가 없어요.');return}navigator.clipboard.writeText(ids.join('\n'));alert('복사됨:\n'+ids.join('\n'))}
boot();
</script></body></html>
