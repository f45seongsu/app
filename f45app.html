<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>F45 성수 · 수업 출결</title>
<style>
:root{--navy:#0a1628;--red:#e4002b;--card:#12203a;--line:#22344f;--txt:#e8eef7;--dim:#8fa3bd;--grn:#25c26e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--txt);font-family:'Pretendard',-apple-system,sans-serif;padding:16px 14px 60px;max-width:900px;margin:0 auto}
h1{font-size:20px;font-weight:800}.sub{color:var(--dim);font-size:13px;margin:2px 0 14px}
.strip{display:flex;gap:6px;overflow-x:auto;padding:4px 0 12px}
.day{flex:none;width:46px;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:6px 0;cursor:pointer}
.day.sel{background:var(--red);border-color:var(--red)}.day.sel .dn{color:#fff}
.day .mo{font-size:9px;color:var(--dim)}.day .dw{font-size:10px;color:var(--dim)}.day .dn{font-size:16px;font-weight:800}
.day .pip{width:5px;height:5px;border-radius:50%;background:var(--grn);margin:2px auto 0}
.ev{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
.evh{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid var(--line)}
.time{background:var(--red);color:#fff;font-weight:800;font-size:14px;padding:4px 8px;border-radius:8px;min-width:50px;text-align:center}
.enm{font-weight:700}.cnt{margin-left:auto;color:var(--dim);font-size:12px}
.tagbtn{background:#1c2f4d;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:5px 9px;font-size:12px;cursor:pointer}
.grid{display:flex;flex-wrap:wrap;gap:8px;padding:11px 13px}
.chip{display:flex;align-items:center;gap:8px;background:#0e1a30;border:1px solid var(--line);border-radius:24px;padding:4px 12px 4px 4px;cursor:pointer}
.chip:hover{border-color:var(--red)}
.av{width:40px;height:40px;border-radius:50%;background:#20304d;flex:none;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--dim);position:relative;overflow:visible}
.av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%}
.av .rd{position:absolute;right:-1px;bottom:-1px;width:9px;height:9px;border-radius:50%;border:2px solid #0e1a30;z-index:2}
.rd.att{background:var(--grn)}.rd.bk{background:#5a6f8c}.rd.noshow{background:#e0563a}.rd.cancel{background:#e0954f}
.chip.s-noshow .nm{color:#e0563a;text-decoration:line-through}
.selbtn{background:#1c2f4d;border:1px solid var(--line);color:var(--dim);border-radius:8px;padding:4px 11px;font-size:12px;cursor:pointer}
.selbtn.on{background:var(--red);border-color:var(--red);color:#fff}
.chip{position:relative}
.chip .ck{position:absolute;top:-5px;right:-5px;width:19px;height:19px;border-radius:50%;background:var(--red);color:#fff;font-size:11px;line-height:19px;text-align:center;display:none;box-shadow:0 0 0 2px var(--navy)}
.chip.picked .ck{display:block}
.chip.picked{outline:2px solid var(--red);outline-offset:1px;border-radius:24px}
.selbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.selbar button{background:#1c2f4d;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 11px;font-size:12px;cursor:pointer}
.selbar button.pri{background:var(--red);border-color:var(--red);font-weight:700}
.selcnt{color:var(--dim);font-size:12px;margin-right:2px}.chip.s-cancel{opacity:.75}.chip.s-cancel .nm{text-decoration:line-through;color:#e0954f}

.nm{font-weight:600;font-size:14px}
.badge{font-size:10px;padding:1px 6px;border-radius:6px}
.b-트라이얼{background:#3d3512;color:#e0c94f}.b-만료{background:#3d1a1a;color:#e06a6a}.b-횟수권{background:#123a3d;color:#4fd6e0}
.inj{color:var(--red);font-size:12px}
#modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;justify-content:center;z-index:9}
#sheet{background:var(--card);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:560px;max-height:85vh;overflow:auto;padding:20px 18px 40px}
.close{float:right;color:var(--dim);cursor:pointer;font-size:24px;line-height:1}
.mhead{display:flex;align-items:center;gap:12px;margin-bottom:12px}.mhead .av{width:84px;height:84px;font-size:26px;cursor:zoom-in}
.mrow{display:flex;gap:8px;margin:5px 0;font-size:14px;align-items:center}.mk{color:var(--dim);min-width:60px;flex:none}
.acts{display:inline-flex;gap:6px;margin-left:auto}
.mini{background:#1c2f4d;border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:3px 10px;font-size:12px;cursor:pointer;text-decoration:none;display:inline-block}
.pass{background:#0d2a2e;border:1px solid #164a50;border-radius:10px;padding:10px 12px;margin:10px 0}
.pass b{color:#4fd6e0;font-size:16px}
.stats{display:flex;gap:8px;margin:12px 0}.stat{flex:1;background:#0e1a30;border-radius:10px;padding:9px;text-align:center}
.stat b{font-size:18px}.stat span{font-size:11px;color:var(--dim);display:block}
.wklab{color:var(--dim);font-size:12px;margin:10px 0 5px}
.sqwrap{max-width:250px}.sqhead,.sq{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}.sqhead div{text-align:center;font-size:10px;color:var(--dim)}.sq{margin-top:4px}.sq div{aspect-ratio:1;border-radius:4px;background:#0e1a30}.sq div.on{background:var(--grn)}.sq div.fut{opacity:.3}
input,textarea{width:100%;background:#0e1a30;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 9px;font-size:13px;font-family:inherit}
textarea{min-height:52px;resize:vertical}
.save{background:var(--red);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-weight:700;cursor:pointer;margin-top:8px}
.hint{color:var(--dim);font-size:11px;margin-top:4px}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:20;padding:24px}
#lightbox img{max-width:100%;max-height:100%;border-radius:14px}
.center{text-align:center;color:var(--dim);padding:60px 20px}
@media(min-width:800px){#sheet{border-radius:18px;margin:auto;max-height:80vh}#modal{align-items:center}}

.topbar{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.topbar h1{font-size:19px;font-weight:800;flex:1}
.ham{background:none;border:none;color:var(--txt);font-size:24px;cursor:pointer;padding:0 2px;line-height:1}
#refreshBtn{background:#1c2f4d;border:1px solid #22344f;color:#e8eef7;border-radius:9px;padding:6px 11px;font-size:15px;cursor:pointer}
body{padding-bottom:76px}
.tabbar{position:fixed;left:0;right:0;bottom:0;display:flex;background:#0c1626;border-top:1px solid var(--line);z-index:40;max-width:760px;margin:0 auto}
.tab{flex:1;background:none;border:none;color:var(--dim);font-size:11px;padding:8px 0 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab span{font-size:19px}
.tab.on{color:var(--red)}
#drawer{position:fixed;inset:0;z-index:60}
.drawer-bg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.drawer-panel{position:absolute;top:0;left:0;bottom:0;width:74%;max-width:300px;background:#0e1a30;border-right:1px solid var(--line);padding:18px 14px;display:flex;flex-direction:column;gap:8px;box-shadow:4px 0 20px rgba(0,0,0,.4)}
.drawer-panel h3{font-size:13px;color:var(--dim);margin-bottom:6px;font-weight:700}
.drawer-panel button,.draw-link{text-align:left;background:#12203a;border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:12px 13px;font-size:14px;cursor:pointer;text-decoration:none;display:block}
.qbox{width:100%;background:#0e1a30;border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:11px 13px;font-size:15px;margin-bottom:10px}
.srow{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 11px;margin-bottom:7px;cursor:pointer}
.sinfo{flex:1;min-width:0}.smeta{color:var(--dim);font-size:12px;margin-top:2px}

.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:12px 8px;margin-top:6px}
.pcell{display:flex;flex-direction:column;align-items:center;gap:5px}
.pav{position:relative;cursor:pointer;display:block;width:64px;height:64px}
.pav .av{width:64px!important;height:64px!important;font-size:18px}
.pav.nophoto .av{outline:2px dashed #e0954f;outline-offset:2px}
.pav .pcam{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);border-radius:50%;opacity:0;font-size:20px;pointer-events:none}
.pav:hover .pcam,.pav.nophoto .pcam{opacity:1}
.pav.drag .pcam{opacity:1}.pav.drag .av{outline:2px solid var(--red)!important}
.pnm{font-size:12px;text-align:center;max-width:76px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.listhead{color:var(--dim);font-size:12px;margin-bottom:12px;line-height:1.6}
.listhead b{color:var(--txt)}
.cacts{display:flex;flex-direction:column;gap:5px;flex:none}
.cacts .mini{background:#1c2f4d;border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;text-align:center}
.srow .sinfo b{font-weight:700}

.subtabs{display:flex;gap:6px;margin-bottom:12px}
.subtabs button{flex:1;background:#0e1a30;border:1px solid var(--line);color:var(--dim);border-radius:9px;padding:9px;font-size:13px;cursor:pointer;font-weight:700}
.subtabs button.on{background:var(--red);border-color:var(--red);color:#fff}
.carecard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 11px;margin-bottom:9px}
.mini4w-wrap{margin:9px 0 4px}
.mini4w{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;max-width:150px}
.m4{aspect-ratio:1;background:#1a2942;border-radius:3px}
.m4.on{background:var(--grn)}.m4.fut{opacity:.2}
.m4lab{color:var(--dim);font-size:10px;margin-top:3px;display:block}
.memoin{width:100%;background:#0e1a30;border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:7px 10px;font-size:12px;margin-top:8px}
</style></head><body>
<header class="topbar"><button class="ham" onclick="toggleDrawer()">≡</button><h1 id="vtitle">수업 출결</h1><button id="refreshBtn" onclick="loadData(true)">↻</button></header>
<div class="sub" id="sub">불러오는 중…</div>

<div id="view-risk" class="view" style="display:none"><div class="center">준비중이에요.</div></div>

 <input id="q" class="qbox" placeholder="이름 또는 전화 뒷자리 검색" oninput="renderSearch()" autocomplete="off">
 <div id="searchList"><div class="center">이름이나 전화 뒷자리를 입력하세요.</div></div>
</div>

<nav class="tabbar">
 <button class="tab on" data-v="att" onclick="showView('att')"><span>📋</span>출결</button>
 <button class="tab" data-v="risk" onclick="showView('risk')"><span>🚨</span>이탈</button>
 <button class="tab" data-v="expire" onclick="showView('expire')"><span>⏳</span>만료</button>
 <button class="tab" data-v="search" onclick="showView('search')"><span>🔍</span>검색</button>
</nav>

<div id="drawer" style="display:none"><div class="drawer-bg" onclick="toggleDrawer()"></div>
 <div class="drawer-panel">
  <h3>더보기</h3>
  <button onclick="showView('trial')">⚡ 트라이얼 현황</button>

 </div>
</div>

<div id="lightbox" onclick="this.style.display='none'"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== 설정: 아래 두 개를 본인 프로젝트 값으로 =====
const SUPABASE_URL = "https://mvgbwsbvngdnxdndwimb.supabase.co";
const PUBLISHABLE_KEY = "sb_publishable_ZRHS4-UR7Q07Fmtc_P-19g_fVlIc85X";
// ===============================================
const TOKEN = new URLSearchParams(location.search).get('key') || '';
let sb, MEMBERS={}, SESSIONS={}, DATES=[], sel='', today='';

function esc(s){return (s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}
function initial(n){return (n||'?').trim().slice(-2)}
function photoOf(m){return m.photo_url||m.glofox_photo||''}
function avatar(m,cls){const p=photoOf(m);const img=p?`<img src="${esc(p)}" onerror="this.style.display='none'">`:'';return `<span class="av">${esc(initial(m.name))}${img}<span class="rd ${cls}"></span></span>`}
function recent28(days){const t=new Date(today+'T00:00:00');const lim=new Date(t);lim.setDate(t.getDate()-28);return (days||[]).some(d=>new Date(d+'T00:00:00')>=lim)}
function badgeOf(m){if(m.stage==='트라이얼')return '트라이얼';if(m.pass_remaining!=null)return '횟수권';if(m.stage==='과거회원')return recent28(m._days)?'횟수권':'만료';return ''}

let VIEW='att';
function toggleDrawer(){const d=document.getElementById('drawer');d.style.display=d.style.display==='none'?'block':'none';}
function showView(v){VIEW=v;
 ['att','risk','expire','search','trial','pass','photo'].forEach(x=>{const el=document.getElementById('view-'+x);if(el)el.style.display=(x===v?'':'none');});
 document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
 const T={att:'수업 출결',risk:'이탈 위험군',expire:'만료 임박',search:'회원 검색',trial:'트라이얼 현황',pass:'횟수권 관리',photo:'사진 입력 (수업별)'};
 document.getElementById('vtitle').textContent=T[v]||'';
 document.getElementById('sub').style.display=(v==='att'?'':'none');
 document.getElementById('drawer').style.display='none';
 if(v==='search'){const q=document.getElementById('q');renderSearch();setTimeout(()=>q&&q.focus(),50);}
 if(v==='photo')renderPhoto();
 if(v==='risk')renderRisk();
 if(v==='expire')renderExpire();
}
function renderSearch(){
 const q=(document.getElementById('q').value||'').trim().toLowerCase();
 const box=document.getElementById('searchList');
 if(!q){box.innerHTML='<div class="center">이름이나 전화 뒷자리를 입력하세요.</div>';return;}
 let list=Object.values(MEMBERS).filter(m=>{const ph=(m.phone||'').replace(/\D/g,'');return (m.name||'').toLowerCase().includes(q)||ph.includes(q);});
 list.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'));
 if(!list.length){box.innerHTML='<div class="center">검색 결과가 없어요.</div>';return;}
 box.innerHTML=list.slice(0,60).map(m=>{const bd=badgeOf(m);
  return `<div class="srow" onclick="open_('${m.glofox_user_id||m.person_id}')">${avatar(m,'bk')}<div class="sinfo"><div class="nm">${esc(m.name)||'(이름없음)'}${bd?` <span class="badge b-${bd}">${bd}</span>`:''}</div><div class="smeta">${esc(m.phone||'')||'번호없음'}</div></div></div>`;}).join('')
  +(list.length>60?'<div class="center">더 좁혀서 검색하세요 (60명까지 표시)</div>':'');
}
function renderPhoto(){
 const evs=(SESSIONS[today]||[]).slice().sort((a,b)=>(a.time||'').localeCompare(b.time||''));
 let h='<div style="color:var(--dim);font-size:12px;margin-bottom:10px">오늘 수업 참석자예요. 얼굴에 사진을 <b>끌어다 놓거나</b> 눌러서 넣으세요. 주황 점선=사진 없음.</div>';
 if(!evs.length){document.getElementById('view-photo').innerHTML=h+'<div class="center">오늘 수업이 없어요.</div>';return;}
 evs.forEach(ev=>{
  h+=`<div class="ev"><div class="evh"><span class="time">${ev.time}</span><span class="enm">${esc(ev.name)}</span></div><div class="pgrid">`;
  ev.att.forEach(a=>{const m=MEMBERS[a.uid]||{name:'(미등록)'};const has=!!m.photo_url;
   h+=`<div class="pcell">
    <label class="pav ${has?'':'nophoto'}" for="pf_${a.uid}" ondragover="dOverA(event)" ondragleave="dLeaveA(event)" ondrop="dropA(event,'${a.uid}')">${avatar(m,'bk')}<span class="pcam">📷</span></label>
    <input type="file" id="pf_${a.uid}" accept="image/*" style="display:none" onchange="upPhotoApp('${a.uid}',this.files[0])">
    <span class="pnm">${esc(m.name)}</span></div>`;});
  h+='</div></div>';
 });
 document.getElementById('view-photo').innerHTML=h;
}
function dOverA(e){e.preventDefault();e.currentTarget.classList.add('drag')}
function dLeaveA(e){e.currentTarget.classList.remove('drag')}
function dropA(e,uid){e.preventDefault();e.currentTarget.classList.remove('drag');const f=[...e.dataTransfer.files].find(x=>x.type.startsWith('image/'));if(f)upPhotoApp(uid,f);else alert('이미지 파일을 놓아주세요.');}
async function upPhotoApp(uid,file){
 if(!file)return;
 const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
 const {error}=await sb.storage.from('photos').upload(`${uid}.${ext}`,file,{upsert:true,contentType:file.type});
 if(error){alert('사진 업로드 실패: '+error.message);return;}
 const {data}=sb.storage.from('photos').getPublicUrl(`${uid}.${ext}`);
 const url=data.publicUrl+'?t='+Date.now();
 const {error:e2}=await sb.from('people').update({photo_url:url}).eq('glofox_user_id',uid);
 if(e2){alert('저장 실패: '+e2.message);return;}
 if(MEMBERS[uid])MEMBERS[uid].photo_url=url;
 renderPhoto();
}
function ddaysAgo(n){const t=new Date(today+'T00:00:00');t.setDate(t.getDate()-n);return fmt(t);}
function lastVisit(m){const d=(m._days||[]).slice().sort();return d.length?d[d.length-1]:null;}
function ddayOf(m){if(!m.end_date||m.end_date.length<10)return null;const t=new Date(today+'T00:00:00');const e=new Date(m.end_date.slice(0,10)+'T00:00:00');return Math.round((e-t)/86400000);}
function msgFor(uid,type){const m=MEMBERS[uid]||{};const nm=m.name||'회원';
 if(type==='risk'){const lv=lastVisit(m);const disp=lv?lv.slice(5).replace('-','/'):'';
  return `${nm}님! 요즘 F45에서 통 못 뵀네요 😊 ${disp?'마지막 운동이 '+disp+'이었어요. ':''}이번 주에 다시 나오셔서 같이 땀 흘려요! 편하신 시간 말씀 주시면 예약 도와드릴게요 💪 -F45 성수`;}
 const dd=ddayOf(m);const ed=m.end_date?m.end_date.slice(0,10):'';
 const when=dd===0?'오늘':(dd>0?`${dd}일 뒤(${ed})`:ed);
 return `${nm}님, 멤버십이 ${when} 만료 예정이에요. 끊김 없이 운동 이어가실 수 있게 재등록 안내드려요! 궁금하신 점 있으면 편하게 답장 주세요 😊 -F45 성수`;}
function smsMsg(uid,type){const m=MEMBERS[uid]||{};const ph=(m.phone||'').replace(/[^0-9]/g,'');if(!ph){alert('번호가 없어요.');return;}location.href='sms:'+ph+'&body='+encodeURIComponent(msgFor(uid,type));}
function copyMsg(uid,type){const t=msgFor(uid,type);navigator.clipboard.writeText(t);alert('문구 복사됨:\n'+t);}
function isUnlimited(m){const s=m.membership||'';return s.includes('무제한')||s.includes('Unlimited')||s.includes('파운데이션')||s.includes('Foundation');}
function saveMemo(uid,val){sb.from('people').update({care_memo:val}).eq('glofox_user_id',uid).then(({error})=>{if(error)alert('메모 저장 실패: '+error.message);else if(MEMBERS[uid])MEMBERS[uid].care_memo=val;});}
function miniGrid(m){const set=new Set(m._days||[]);const t=new Date(today+'T00:00:00');
 const dow=(t.getDay()+6)%7;const mon=new Date(t);mon.setDate(t.getDate()-dow);let c='';
 for(let w=3;w>=0;w--)for(let d=0;d<6;d++){const cur=new Date(mon);cur.setDate(mon.getDate()-w*7+d);
  const ds=fmt(cur);c+=`<span class="m4 ${set.has(ds)?'on':''} ${cur>t?'fut':''}"></span>`;}
 return c;}
function careCard(uid,metaHtml,type,showGrid){const m=MEMBERS[uid]||{name:'?'};const bd=badgeOf(m);const ph=(m.phone||'').replace(/[^0-9]/g,'');
 return `<div class="carecard">
   <div class="srow" style="border:0;padding:0;margin:0;background:none">
     <span onclick="open_('${uid}')">${avatar(m,'bk')}</span>
     <div class="sinfo" onclick="open_('${uid}')"><div class="nm">${esc(m.name)||'(이름없음)'}${bd?` <span class="badge b-${bd}">${bd}</span>`:''}</div><div class="smeta">${metaHtml}</div></div>
     <div class="cacts">${ph?`<button class="mini" onclick="smsMsg('${uid}','${type}')">문자</button><button class="mini" onclick="copyMsg('${uid}','${type}')">문구</button>`:'<span class="smeta">번호없음</span>'}</div>
   </div>
   ${showGrid?`<div class="mini4w-wrap"><div class="mini4w">${miniGrid(m)}</div><span class="m4lab">← 4주 전 ··· 최근 →</span></div>`:''}
   <input class="memoin" value="${esc(m.care_memo||'')}" placeholder="메모 (예: 6/20 통화함·안받음)" onchange="saveMemo('${uid}',this.value)">
 </div>`;}
let riskTab='risk';
function setRiskTab(t){riskTab=t;renderRisk();}
function renderRisk(){
 const box=document.getElementById('view-risk');
 const tabs=`<div class="subtabs"><button class="${riskTab==='risk'?'on':''}" onclick="setRiskTab('risk')">이탈 위험</button><button class="${riskTab==='expired'?'on':''}" onclick="setRiskTab('expired')">최근 만료</button></div>`;
 box.innerHTML=tabs+(riskTab==='risk'?riskListHTML():expiredListHTML());
}
function riskListHTML(){const d14=ddaysAgo(14),d28=ddaysAgo(28);let list=[];
 Object.values(MEMBERS).forEach(m=>{if(m.stage!=='회원'||!m.glofox_user_id||!isUnlimited(m))return;
  const ed=m.end_date&&m.end_date.length>=10?m.end_date.slice(0,10):null;if(ed&&ed<today)return;
  const days=m._days||[];const recent=days.filter(d=>d>d14).length;const prior=days.filter(d=>d>d28&&d<=d14).length;
  if(recent<=1&&prior>=3)list.push({uid:m.glofox_user_id,prior,recent});});
 list.sort((a,b)=>b.prior-a.prior);
 if(!list.length)return '<div class="center">지금은 이탈 위험 회원이 없어요 👍</div>';
 return `<div class="listhead">🚨 무제한 회원 중 최근 2주 급감 <b>${list.length}명</b> · 아래 4주 칸이 오른쪽으로 갈수록 비면 이탈 신호예요.</div>`+
  list.map(x=>{const m=MEMBERS[x.uid];const lv=lastVisit(m);
   const meta=`그전 2주 <b style="color:#5aa0e0">${x.prior}회</b> → 최근 2주 <b style="color:#e0563a">${x.recent}회</b>${lv?` · 마지막 ${lv.slice(5).replace('-','/')}`:''}`;
   return careCard(x.uid,meta,'risk',true);}).join('');}
function expiredListHTML(){let list=[];
 Object.values(MEMBERS).forEach(m=>{if(!m.glofox_user_id||!isUnlimited(m))return;const dd=ddayOf(m);if(dd!=null&&dd<0&&dd>=-21)list.push({uid:m.glofox_user_id,dd});});
 list.sort((a,b)=>b.dd-a.dd);
 if(!list.length)return '<div class="center">최근 3주 내 만료된 무제한 회원이 없어요.</div>';
 return `<div class="listhead">📕 최근 3주 내 만료 (미재등록) <b>${list.length}명</b> · 재등록 유도 대상</div>`+
  list.map(x=>{const m=MEMBERS[x.uid];const meta=`<b style="color:#e0563a">${-x.dd}일 전 만료</b> · ${esc(m.end_date?m.end_date.slice(0,10):'')}${m.membership?' · '+esc(m.membership):''}`;
   return careCard(x.uid,meta,'expire',false);}).join('');}
function renderExpire(){let list=[];
 Object.values(MEMBERS).forEach(m=>{if(!m.glofox_user_id||m.stage==='트라이얼')return;const dd=ddayOf(m);if(dd!=null&&dd>=0&&dd<=14)list.push({uid:m.glofox_user_id,dd});});
 list.sort((a,b)=>a.dd-b.dd);
 const box=document.getElementById('view-expire');
 if(!list.length){box.innerHTML='<div class="center">2주 내 만료 예정 회원이 없어요.</div>';return;}
 box.innerHTML=`<div class="listhead">⏳ 14일 내 만료 예정 <b>${list.length}명</b> · 재등록 상담 대상 (임박순) · 트라이얼 제외</div>`+
  list.map(x=>{const m=MEMBERS[x.uid];const ed=m.end_date?m.end_date.slice(0,10):'';
   const meta=`<b style="color:${x.dd<=3?'#e0563a':'#e0954f'}">${x.dd===0?'오늘 만료':'D-'+x.dd}</b> · ${esc(ed)}${m.membership?' · '+esc(m.membership):''}`;
   return careCard(x.uid,meta,'expire',false);}).join('');}
async function boot(){
 const il=document.getElementById('inputLink');if(il)il.href='회원입력.html'+location.search;
 if(!SUPABASE_URL||!PUBLISHABLE_KEY){document.getElementById('app').innerHTML='<div class="center">앱 설정이 필요해요.<br>파일 상단 SUPABASE_URL / PUBLISHABLE_KEY 를 채워주세요.</div>';return;}
 sb=supabase.createClient(SUPABASE_URL,PUBLISHABLE_KEY,{global:{headers:{'x-app-token':TOKEN}}});
 await loadData();
 setInterval(()=>loadData(), 5*60*1000); // 5분마다 자동 새로고침
}
async function loadData(manual){
 const btn=document.getElementById('refreshBtn'); if(btn){btn.disabled=true;btn.textContent='불러오는 중…';}
 today=new Date().toLocaleDateString('sv-SE',{timeZone:'Asia/Seoul'});
 MEMBERS={};
 const {data:people,error:e1}=await sb.from('people').select('*');
 if(e1){fail(e1);if(btn){btn.disabled=false;btn.textContent='↻ 새로고침';}return;}
 people.forEach(p=>{MEMBERS[p.glofox_user_id]=p});
 const since=new Date(today+'T00:00:00');since.setDate(since.getDate()-35);
 let all=[],from=0;
 while(true){
  const {data,error:e2}=await sb.from('attendance').select('glofox_user_id,event_id,class_name,class_time,attended,status')
    .gte('class_time',since.toISOString()).order('class_time',{ascending:true}).range(from,from+999);
  if(e2){fail(e2);if(btn){btn.disabled=false;btn.textContent='↻ 새로고침';}return;}
  all=all.concat(data); if(data.length<1000)break; from+=1000;
 }
 buildSessions(all);
 render();
 const now=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Seoul'});
 window._lastUpdate=now;
 if(btn){btn.disabled=false;btn.textContent='↻ 새로고침';}
}
function fail(e){document.getElementById('app').innerHTML=`<div class="center">데이터를 못 불러왔어요.<br><small>${esc(e.message||JSON.stringify(e))}</small><br><br>링크의 열쇠(?key=)가 맞는지, 설정 값이 맞는지 확인해주세요.</div>`;}

function buildSessions(rows){
 const ev={};
 rows.forEach(r=>{
  const ct=String(r.class_time||''); const ds=ct.slice(0,10); const tm=ct.slice(11,16);
  if(!r.event_id||ds.length<10)return;
  const e=ev[r.event_id]||(ev[r.event_id]={date:ds,time:tm,name:r.class_name||'수업',att:{}});
  const prev=e.att[r.glofox_user_id]||{};
  e.att[r.glofox_user_id]={attended:(r.attended||prev.attended||false),status:r.status||prev.status||''};
  if(r.attended){const m=MEMBERS[r.glofox_user_id];if(m){(m._days=m._days||[]);if(!m._days.includes(ds))m._days.push(ds);}}
 });
 SESSIONS={};
 Object.values(ev).forEach(e=>{(SESSIONS[e.date]=SESSIONS[e.date]||[]).push({time:e.time,name:e.name,att:Object.entries(e.att).map(([uid,a])=>({uid,attended:a.attended,status:a.status}))})});
 Object.keys(SESSIONS).forEach(d=>SESSIONS[d].sort((a,b)=>a.time<b.time?-1:1));
 DATES=Object.keys(SESSIONS).sort();
 sel=DATES.includes(today)?today:DATES[DATES.length-1];
}
const DOW=['일','월','화','수','목','금','토'];
function render(){renderStrip();renderDay(!window._loaded);window._loaded=true;document.getElementById('sub').textContent=`업데이트 ${window._lastUpdate||''} · 날짜를 골라 지난 수업도 볼 수 있어요`;}
function renderStrip(){let h='';DATES.forEach(d=>{const dt=new Date(d+'T00:00:00');
 h+=`<div class="day ${d===sel?'sel':''}" onclick="sel='${d}';selEv=null;renderStrip();renderDay(true)"><div class="mo">${dt.getMonth()+1}월</div><div class="dw">${DOW[dt.getDay()]}</div><div class="dn">${dt.getDate()}</div><div class="pip"></div></div>`;});
 document.getElementById('strip').innerHTML=h;const s=document.querySelector('.day.sel');if(s)s.scrollIntoView({inline:'center',block:'nearest'});}
let selEv=null; const PICK=new Set();
function renderDay(doScroll){const evs=(SESSIONS[sel]||[]).slice().sort((a,b)=>(a.time||'').localeCompare(b.time||''));
 SESSIONS[sel]=evs; let h='';const nowTs=new Date();
 evs.forEach((ev,i)=>{
  const passed=new Date(sel+'T'+(ev.time||'23:59')+':00')<nowTs;
  ev.att.forEach(a=>{a._st=a.status==='CANCELED'?'cancel':(a.attended?'att':(passed?'noshow':'bk'));});
  const ordr={att:0,bk:1,noshow:2,cancel:3};
  ev.att.sort((x,y)=>ordr[x._st]-ordr[y._st]);
  const present=ev.att.filter(a=>a._st==='att').length;
  const noshow=ev.att.filter(a=>a._st==='noshow').length;
  const cancel=ev.att.filter(a=>a._st==='cancel').length;
  const cntTxt=`${ev.att.length}명 · ${present} 출석`+(noshow?` · <span style="color:#e0563a">${noshow} 노쇼</span>`:'')+(cancel?` · <span style="color:#e0954f">${cancel} 취소</span>`:'');
  const on=selEv===i;
  h+=`<div class="ev" id="ev_${i}"><div class="evh"><span class="time">${ev.time}</span><span class="enm">${esc(ev.name)}</span><span class="cnt">${cntTxt}</span><button class="selbtn ${on?'on':''}" onclick="toggleSel(${i})">${on?'완료':'선택'}</button></div><div class="grid">`;
  ev.att.forEach(a=>{const m=MEMBERS[a.uid]||{name:'(미등록)'};const bd=badgeOf(m);
   const pk=on&&PICK.has(a.uid);
   const click=on?`pick('${a.uid}')`:`open_('${a.uid}')`;
   h+=`<div class="chip s-${a._st} ${pk?'picked':''}" onclick="${click}">${avatar(m,a._st)}<span class="nm">${esc(m.name)}</span>${bd?`<span class="badge b-${bd}">${bd}</span>`:''}${m.injury_note?'<span class="inj">⚠</span>':''}<span class="ck">✓</span></div>`;});
  h+='</div>';
  if(on){h+=`<div class="selbar"><span class="selcnt">${PICK.size}명 선택</span><button onclick="pickAll(${i})">전체</button><button onclick="pickNone()">해제</button><button class="pri" onclick="copyInsta()">@ 인스타복사</button><button class="pri" onclick="copyPhones()">번호복사</button><button onclick="smsOpen()">문자앱</button></div>`;}
  h+='</div>';});
 document.getElementById('app').innerHTML=h||'<div class="center">이 날은 수업이 없어요.</div>';
 if(doScroll!==false && sel===today && evs.length){
  const nowM=nowTs.getHours()*60+nowTs.getMinutes();let tg=-1;
  evs.forEach((ev,i)=>{const pr=(ev.time||'0:0').split(':').map(Number);const em=pr[0]*60+pr[1];if(tg<0&&em+60>=nowM)tg=i;});
  if(tg<0)tg=evs.length-1;const el=document.getElementById('ev_'+tg);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
 }}
function toggleSel(i){if(selEv===i){selEv=null;}else{selEv=i;PICK.clear();}renderDay(false);}
function pick(uid){if(PICK.has(uid))PICK.delete(uid);else PICK.add(uid);renderDay(false);}
function pickAll(i){SESSIONS[sel][i].att.forEach(a=>PICK.add(a.uid));renderDay(false);}
function pickNone(){PICK.clear();renderDay(false);}
function pickedMembers(){return [...PICK].map(u=>MEMBERS[u]).filter(m=>m);}
function copyInsta(){const ids=pickedMembers().map(m=>(m.instagram||'').replace('@','').trim()).filter(x=>x).map(x=>'@'+x);
 if(!ids.length){alert('선택된 회원 중 인스타 ID가 없어요.');return;}
 navigator.clipboard.writeText(ids.join(' '));alert(`${ids.length}명 인스타 복사됨:\n`+ids.join(' '));}
function copyPhones(){const ph=pickedMembers().map(m=>(m.phone||'').replace(/[^0-9]/g,'')).filter(x=>x);
 if(!ph.length){alert('선택된 회원 중 번호가 없어요.');return;}
 navigator.clipboard.writeText(ph.join(', '));alert(`${ph.length}명 번호 복사됨 (문자앱 수신자칸에 붙여넣기):\n`+ph.join(', '));}
function smsOpen(){const ph=pickedMembers().map(m=>(m.phone||'').replace(/[^0-9]/g,'')).filter(x=>x);
 if(!ph.length){alert('선택된 회원 중 번호가 없어요.');return;}location.href='sms:'+ph.join(',');}
function fmt(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function timeColor(h){
 if(h>=6&&h<12){const t=(h-6)/6;return `hsl(353,75%,${38+t*22}%)`;}
 if(h>=12&&h<15){const t=(h-12)/3;return `hsl(45,85%,${44+t*16}%)`;}
 const t=Math.min(Math.max((h-15)/9,0),1);return `hsl(210,70%,${40+t*24}%)`;}
function weekGrid(dayHour){const set=dayHour||{};const t=new Date(today+'T00:00:00');let cnt=0;
 const dow=(t.getDay()+6)%7;const mon=new Date(t);mon.setDate(t.getDate()-dow);let cells='';
 for(let w=3;w>=0;w--)for(let d=0;d<6;d++){const cur=new Date(mon);cur.setDate(mon.getDate()-w*7+d);
  const ds=fmt(cur);const has=set[ds]!=null;const fut=cur>t;if(has)cnt++;
  const style=has?`style="background:${timeColor(set[ds])}"`:'';
  cells+=`<div class="${has?'on':''} ${fut?'fut':''}" ${style}></div>`;}
 return {html:cells,cnt};}
function copyTxt(t,msg){navigator.clipboard.writeText(t);alert(msg+'\n'+t)}
function bigPhoto(url){if(!url)return;document.getElementById('lightbox').innerHTML=`<img src="${url}">`;document.getElementById('lightbox').style.display='flex'}

async function open_(uid){
 const m=MEMBERS[uid]||{name:'(미등록)'};
 // 전체 출석 이력 조회 (총출석 + 4주)
 const {data:att}=await sb.from('attendance').select('class_time,attended,class_name').eq('glofox_user_id',uid).eq('attended',true).order('class_time',{ascending:false});
 const dayHour={};
 (att||[]).forEach(a=>{const ct=String(a.class_time);const ds=ct.slice(0,10);const hh=parseInt(ct.slice(11,13));if(!isNaN(hh)){if(dayHour[ds]==null||hh<dayHour[ds])dayHour[ds]=hh;}});
 const total=(att||[]).length; const w=weekGrid(dayHour); const bd=badgeOf(m);
 const ph=(m.phone||'').replace(/[^0-9]/g,''); const ig=(m.instagram||'').replace('@','');
 const passHTML = m.pass_remaining!=null ? `<div class="pass">횟수권 · 잔여 <b>${m.pass_remaining}회</b> / 총 ${m.pass_total||'-'}회<br><span style="color:var(--dim);font-size:12px">만료 ${esc(m.pass_expiry)||'-'}</span></div>`:'';
 document.getElementById('sheet').innerHTML=`<span class="close" onclick="close_()">×</span>
 <div class="mhead"><span onclick="bigPhoto('${esc(photoOf(m))}')">${avatar(m,'bk')}</span><div><h2 style="font-size:19px">${esc(m.name)} ${bd?`<span class="badge b-${bd}">${bd}</span>`:''}</h2></div></div>
 <div class="mrow"><span class="mk">연락처</span><span>${esc(m.phone)||'-'}</span>${ph?`<span class="acts"><a class="mini" href="tel:${ph}">통화</a><a class="mini" href="sms:${ph}">문자</a><span class="mini" onclick="copyTxt('${esc(m.phone)}','번호 복사됨 · 카톡에 붙여넣기')">카톡</span></span>`:''}</div>
 <div class="mrow"><span class="mk">인스타</span><span>${ig?'@'+esc(ig):'-'}</span>${ig?`<span class="acts"><span class="mini" onclick="copyTxt('@${esc(ig)}','태그 복사됨')">태그</span></span>`:''}</div>
 <div class="mrow"><span class="mk">멤버십</span>${esc(m.membership)||'-'}</div>
 <div class="mrow"><span class="mk">가입일</span>${esc(m.join_date)||'-'}</div>
 <div class="mrow"><span class="mk">만료일</span>${esc(m.end_date)||'-'}</div>
 ${passHTML}
 <div class="stats"><div class="stat"><b>${total}</b><span>총 출석</span></div><div class="stat"><b>${w.cnt}</b><span>최근 4주</span></div></div>
 <div class="wklab">최근 4주 출석 (월~토) · 색상=주 출석 시간대</div><div class="sqwrap"><div class="sqhead"><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div><div class="sq">${w.html}</div></div>
 <div style="display:flex;gap:12px;margin-top:6px;font-size:11px"><span style="color:#e06a6a">■ 오전</span><span style="color:#e0c94f">■ 점심</span><span style="color:#5aa0e0">■ 오후/저녁</span></div>
 <div class="wklab" style="margin-top:14px">부상/주의</div><textarea id="f_injury">${esc(m.injury_note)}</textarea>
 <div class="wklab" style="margin-top:8px">메모</div><textarea id="f_memo">${esc(m.memo)}</textarea>
 <div class="wklab" style="margin-top:8px">인스타 ID</div><input id="f_insta" value="${esc(m.instagram)}">
 <button class="save" onclick="save('${uid}')">저장</button>
 <div class="hint">저장하면 모든 코치에게 공유돼요.</div>`;
 document.getElementById('modal').style.display='flex';
}
async function save(uid){
 const patch={injury_note:document.getElementById('f_injury').value,memo:document.getElementById('f_memo').value,instagram:document.getElementById('f_insta').value};
 const {error}=await sb.from('people').update(patch).eq('glofox_user_id',uid);
 if(error){alert('저장 실패: '+(error.message||''));return;}
 Object.assign(MEMBERS[uid],patch); close_(); renderDay();
}
function close_(){document.getElementById('modal').style.display='none'}
function tag(d,i){const ids=SESSIONS[d][i].att.map(a=>(MEMBERS[a.uid]||{}).instagram).filter(x=>x).map(x=>'@'+x.replace('@',''));
 if(!ids.length){alert('등록된 인스타 ID가 없어요.');return}navigator.clipboard.writeText(ids.join(' '));alert('복사됨:\n'+ids.join(' '))}
boot();
</script></body></html>
