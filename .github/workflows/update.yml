name: F45 데이터 자동 갱신

on:
  schedule:
    - cron: '*/30 * * * *'      # 30분마다 재점화 시도 (GitHub이 늦게 켜줘도 루프가 커버)
  workflow_dispatch:            # 수동 실행 버튼

concurrency:
  group: f45-update
  cancel-in-progress: true      # 새로 켜지면 이전 루프 정리 (중복 방지)

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 350        # 최대 약 5시간 50분 루프
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 라이브러리 설치
        run: pip install supabase

      - name: 2분마다 반복 갱신
        env:
          GLOFOX_API_KEY: ${{ secrets.GLOFOX_API_KEY }}
          GLOFOX_API_TOKEN: ${{ secrets.GLOFOX_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          END=$((SECONDS+20400))     # 약 5시간 40분간 루프
          i=0
          while [ $SECONDS -lt $END ]; do
            i=$((i+1))
            echo "===== 갱신 #$i ($(TZ=Asia/Seoul date '+%H:%M:%S')) ====="
            timeout 170 python 자동갱신.py || echo "이번 회차 실패/지연(무시하고 계속)"
            sleep 120               # 2분 대기 (전체 52페이지 수집에 ~40-60초 소요)
          done
          echo "루프 종료 — 다음 스케줄에 재시작됩니다."
