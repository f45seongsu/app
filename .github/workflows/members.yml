name: F45 회원정보 갱신
 
on:
  schedule:
    - cron: '0 19 * * *'       # 매일 UTC 19:00 = KST 04:00 (하루 1회)
  workflow_dispatch:            # 수동 실행(앱 버튼/직접)
 
concurrency:
  group: f45-members
  cancel-in-progress: false
 
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 라이브러리 설치
        run: pip install supabase
      - name: 전체 회원 갱신 실행
        env:
          GLOFOX_API_KEY: ${{ secrets.GLOFOX_API_KEY }}
          GLOFOX_API_TOKEN: ${{ secrets.GLOFOX_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python 전체회원갱신.py
