<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>F45 성수 · 회원 입력</title>
<style>
:root{--navy:#0a1628;--red:#e4002b;--card:#12203a;--line:#22344f;--txt:#e8eef7;--dim:#8fa3bd;--grn:#25c26e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--txt);font-family:'Pretendard',-apple-system,sans-serif;padding:14px 12px 60px;max-width:760px;margin:0 auto}
h1{font-size:19px;font-weight:800;margin-bottom:4px}
.sub{color:var(--dim);font-size:12px;margin-bottom:12px}
.bar{position:sticky;top:0;background:var(--navy);padding:6px 0 10px;z-index:5}
.search{width:100%;background:#0e1a30;border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:10px 12px;font-size:15px}
.filters{display:flex;gap:6px;margin-top:8px}
.fbtn{flex:1;background:#0e1a30;border:1px solid var(--line);color:var(--dim);border-radius:8px;padding:7px;font-size:12px;cursor:pointer}
.fbtn.on{background:var(--red);border-color:var(--red);color:#fff}
.row{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:9px 11px;margin-bottom:8px}
.av{width:52px;height:52px;border-radius:50%;background:#20304d;flex:none;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--dim);position:relative;overflow:hidden;cursor:pointer}
.av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.av .cam{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;font-size:18px;opacity:0;transition:.15s}
.av:hover .cam{opacity:1}
.av.drag{outline:2px dashed var(--red);outline-offset:2px}.av.drag .cam{opacity:1}
.vid.drag{color:var(--red);text-decoration:underline}
.info{flex:1;min-width:0}
.nm{font-weight:700;font-size:15px}
.badge{font-size:10px;padding:1px 6px;border-radius:6px;margin-left:5px}
.b-트라이얼{background:#3d3512;color:#e0c94f}.b-회원{background:#123d2a;color:#4fe08a}.b-과거회원{background:#3d1a1a;color:#e06a6a}.b-리드{background:#3d2412;color:#e0954f}
.meta{color:var(--dim);font-size:11px;margin-top:2px;line-height:1.4}
.ig{display:flex;align-items:center;gap:5px;margin-top:5px}
.ig span{color:var(--dim);font-size:13px}
.ig input{flex:1;background:#0e1a30;border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:5px 8px;font-size:13px}
.vid{font-size:11px;color:var(--dim);margin-top:3px;cursor:pointer}
.vid.has{color:var(--grn)}
.ok{color:var(--grn);font-size:11px;margin-left:6px;opacity:0;transition:.2s}
.ok.show{opacity:1}
.center{text-align:center;color:var(--dim);padding:50px 20px}
.count{color:var(--dim);font-size:12px;margin:8px 2px}
</style></head><body>
<h1>F45 성수 · 회원 빠른 입력</h1>
<div class="sub">사진 동그라미를 누르거나 <b>이미지를 끌어다 놓기</b> · 영상칸에 <b>mp4 드래그</b> · 인스타 즉시 저장 · 모든 코치에게 공유돼요</div>
<div class="bar">
 <input class="search" id="q" placeholder="이름 검색…" oninput="render()">
 <div class="filters">
  <button class="fbtn on" id="f_all" onclick="setF('all')">전체</button>
  <button class="fbtn" id="f_nophoto" onclick="setF('nophoto')">사진 없는 사람</button>
  <button class="fbtn" id="f_active" onclick="setF('active')">활성 회원만</button>
 </div>
</div>
<div class="count" id="count"></div>
<div id="list"><div class="center">불러오는 중…</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://mvgbwsbvngdnxdndwimb.supabase.co";
const PUBLISHABLE_KEY="sb_publishable_ZRHS4-UR7Q07Fmtc_P-19g_fVlIc85X";
const TOKEN=new URLSearchParams(location.search).get('key')||'';
let sb, PEOPLE=[], filter='all';
function esc(s){return (s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]))}
function initial(n){return (n||'?').trim().slice(-2)}
function photoOf(m){return m.photo_url||m.glofox_photo||''}

function dOver(e){e.preventDefault();e.currentTarget.classList.add('drag')}
function dLeave(e){e.currentTarget.classList.remove('drag')}
function dropPhoto(e,pid){e.preventDefault();e.currentTarget.classList.remove('drag');
 const f=[...e.dataTransfer.files].find(x=>x.type.startsWith('image/'));
 if(f)upPhoto(pid,f);else alert('이미지 파일을 놓아주세요.');}
function dropVideo(e,pid){e.preventDefault();e.currentTarget.classList.remove('drag');
 const f=[...e.dataTransfer.files].find(x=>x.type.startsWith('video/'));
 if(f)upVideo(pid,f);else alert('영상 파일(mp4 등)을 놓아주세요.');}
function metaLine(m){
 const p=[];
 const ph=(m.phone||'').replace(/\D/g,'');
 if(ph.length>=4)p.push('📞…'+ph.slice(-4));
 const g=m.gender==='남'||m.gender==='M'||m.gender==='male'?'남':(m.gender==='여'||m.gender==='F'||m.gender==='female'?'여':'');
 const yy=(m.birth||'').slice(-2);
 if(g||yy)p.push((g||'')+(g&&yy?'·':'')+(yy?"'"+yy:''));
 if(m.join_date&&m.join_date.length>=7)p.push('가입'+m.join_date.slice(2,7).replace('-','.'));
 const last=LAST[m.glofox_user_id];
 if(last)p.push('출석'+last.slice(5).replace('-','/'));
 else p.push('출석없음');
 if(m.membership){let mm=m.membership;if(mm.length>12)mm=mm.slice(0,12)+'…';p.push(mm);}
 return p.join(' · ');
}
async function boot(){
 sb=supabase.createClient(SUPABASE_URL,PUBLISHABLE_KEY,{global:{headers:{'x-app-token':TOKEN}}});
 const {data,error}=await sb.from('people').select('person_id,glofox_user_id,name,stage,photo_url,glofox_photo,instagram,video_url,phone,membership,join_date,gender,birth,end_date').order('stage');
 if(error){document.getElementById('list').innerHTML=`<div class="center">불러오기 실패<br><small>${esc(error.message)}</small></div>`;return;}
 PEOPLE=data||[];
 render();
 loadLastSeen();  // 마지막 출석일 (뒤에서 채워 다시 그림)
}
let LAST={};
async function loadLastSeen(){
 let from=0;
 while(true){
  const {data,error}=await sb.from('attendance').select('glofox_user_id,class_time')
    .eq('attended',true).order('class_time',{ascending:false}).range(from,from+999);
  if(error||!data||!data.length)break;
  data.forEach(a=>{const u=a.glofox_user_id;if(!LAST[u])LAST[u]=String(a.class_time).slice(0,10);});
  if(data.length<1000)break; from+=1000;
 }
 render();  // 마지막출석 채워서 다시 그림
}
function setF(f){filter=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
 document.getElementById('f_'+(f==='all'?'all':f)).classList.add('on');render();}
function match(m){
 const q=document.getElementById('q').value.trim().toLowerCase();
 if(q){const ph=(m.phone||'').replace(/\D/g,'');if(!(m.name||'').toLowerCase().includes(q) && !ph.includes(q)) return false;}
 if(filter==='nophoto' && m.photo_url) return false;
 if(filter==='active' && !['회원','트라이얼'].includes(m.stage)) return false;
 return true;
}
function render(){
 const list=PEOPLE.filter(match);
 document.getElementById('count').textContent=`${list.length}명`;
 if(!list.length){document.getElementById('list').innerHTML='<div class="center">해당하는 회원이 없어요.</div>';return;}
 let h='';
 list.slice(0,300).forEach(m=>{
  const p=photoOf(m);const pid=esc(m.person_id);
  h+=`<div class="row" id="row_${pid}">
   <label class="av" for="ph_${pid}" ondragover="dOver(event)" ondragleave="dLeave(event)" ondrop="dropPhoto(event,'${pid}')">${p?`<img src="${esc(p)}">`:esc(initial(m.name))}<span class="cam">📷</span></label>
   <input type="file" id="ph_${pid}" accept="image/*" style="display:none" onchange="upPhoto('${pid}',this.files[0])">
   <div class="info">
     <div><span class="nm">${esc(m.name)||'(이름없음)'}</span>${m.stage?`<span class="badge b-${m.stage}">${m.stage}</span>`:''}<span class="ok" id="ok_${pid}">✓ 저장됨</span></div>
     <div class="meta">${esc(metaLine(m))}</div>
     <div class="ig"><span>@</span><input value="${esc((m.instagram||'').replace('@',''))}" placeholder="인스타 ID" onchange="saveIg('${pid}',this.value)"></div>
     <div class="vid ${m.video_url?'has':''}" id="vid_${pid}" onclick="document.getElementById('vf_${pid}').click()" ondragover="dOver(event)" ondragleave="dLeave(event)" ondrop="dropVideo(event,'${pid}')">${m.video_url?'🎬 영상 있음 (교체)':'＋ 영상 올리기'}</div>
     <input type="file" id="vf_${pid}" accept="video/*,.mp4,.mov" style="display:none" onchange="upVideo('${pid}',this.files[0])">
   </div></div>`;
 });
 if(list.length>300) h+='<div class="count">검색으로 좁혀주세요 (처음 300명만 표시)</div>';
 document.getElementById('list').innerHTML=h;
}
function flash(pid){const e=document.getElementById('ok_'+pid);if(e){e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1500);}}
async function upPhoto(pid,file){
 if(!file)return;
 const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
 const path=`${pid}.${ext}`;
 const {error}=await sb.storage.from('photos').upload(path,file,{upsert:true,contentType:file.type});
 if(error){alert('사진 업로드 실패: '+error.message);return;}
 const {data}=sb.storage.from('photos').getPublicUrl(path);
 const url=data.publicUrl+'?t='+Date.now();
 const {error:e2}=await sb.from('people').update({photo_url:url}).eq('person_id',pid);
 if(e2){alert('저장 실패: '+e2.message);return;}
 const m=PEOPLE.find(x=>x.person_id==pid);if(m)m.photo_url=url;
 const label=document.querySelector(`#row_${pid} .av`);if(label)label.innerHTML=`<img src="${url}"><span class="cam">📷</span>`;
 flash(pid);
}
async function upVideo(pid,file){
 if(!file)return;
 if(file.size>50*1024*1024){alert('영상은 50MB 이하로 올려주세요.');return;}
 const ext=(file.name.split('.').pop()||'mp4').toLowerCase();
 const path=`${pid}.${ext}`;
 const vd=document.getElementById('vid_'+pid);if(vd)vd.textContent='업로드 중…';
 const {error}=await sb.storage.from('videos').upload(path,file,{upsert:true,contentType:file.type});
 if(error){alert('영상 업로드 실패: '+error.message);if(vd)vd.textContent='＋ 영상 올리기';return;}
 const {data}=sb.storage.from('videos').getPublicUrl(path);
 const url=data.publicUrl+'?t='+Date.now();
 await sb.from('people').update({video_url:url}).eq('person_id',pid);
 const m=PEOPLE.find(x=>x.person_id==pid);if(m)m.video_url=url;
 if(vd){vd.textContent='🎬 영상 있음 (교체)';vd.classList.add('has');}
 flash(pid);
}
async function saveIg(pid,val){
 const {error}=await sb.from('people').update({instagram:val.replace('@','').trim()}).eq('person_id',pid);
 if(error){alert('저장 실패: '+error.message);return;}
 const m=PEOPLE.find(x=>x.person_id==pid);if(m)m.instagram=val;
 flash(pid);
}
boot();
</script></body></html>
